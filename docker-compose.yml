services:
  mongodb:
    image: mongo:latest
    container_name: neurosentinel-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=soulsync
    volumes:
      - mongodb_data:/data/db
    stdin_open: true
    tty: true

  server:
    build: ./server
    container_name: neurosentinel-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - python
      - redis
      - mongodb
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./data:/data
    stdin_open: true
    tty: true

  python:
    build: ./python-server
    container_name: neurosentinel-python
    ports:
      - "8000:8000"
    env_file:
      - ./python-server/.env
    volumes:
      - ./data:/data

  client:
    build: ./client
    container_name: neurosentinel-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://server:5000
    stdin_open: true
    tty: true
    volumes:
      - ./client:/app
      - /app/node_modules

  redis:
    image: redis:7
    container_name: neurosentinel-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  mongodb_data:
